# ============================================================
#  Surveillance CROUS — GitHub Actions
#  Lance une vérification environ toutes les 5 minutes.
#
#  ⚠️ À savoir (limites de GitHub, pas du bot) :
#   - "*/5" est la fréquence MINIMALE autorisée ; en pratique GitHub
#     déclenche avec du retard aux heures chargées (souvent 5 à 15 min
#     réels entre deux exécutions). C'est le prix du 100 % gratuit.
#   - GitHub désactive les planifications après 60 jours sans activité
#     dans le dépôt ; ici, le commit automatique du fichier d'état
#     maintient le dépôt actif, donc pas de souci.
# ============================================================
name: Surveillance CROUS Limoges

on:
  schedule:
    - cron: "*/5 * * * *"   # minutes 2,7,12,... (évite la congestion de la minute 0)
  workflow_dispatch: {}         # bouton "Run workflow" pour tester à la main

# Une seule exécution à la fois : évite deux commits d'état simultanés.
concurrency:
  group: surveillance-crous
  cancel-in-progress: false

permissions:
  contents: write               # nécessaire pour committer data/etat.json

jobs:
  verifier:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Vérifier les logements
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VILLE: "Limoges"
          BOUNDS: "1.15_45.93_1.35_45.77"
          TARGET_YEAR: "2026-2027"
          PRIORITY_RESIDENCES: "Camille Guérin"
          PRIORITY_REPEAT: "3"
          HEARTBEAT_HOUR: "9"
          TIMEZONE: "Africa/Algiers"
          LOG_FILE: ""            # sur Actions : logs console uniquement
        run: python crous_bot.py --once

      - name: Sauvegarder l'état (mémoire entre deux exécutions)
        run: |
          git config user.name "crous-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/etat.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "état de surveillance [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push || (git pull --rebase origin "${GITHUB_REF_NAME}" && git push)
          fi
