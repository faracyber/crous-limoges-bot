name: Surveillance CROUS Limoges

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: surveillance-crous
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verifier:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Vérifier les logements
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VILLE: "Limoges"
          BOUNDS: "1.15_45.93_1.35_45.77"
          TARGET_YEAR: "2026-2027"
          PRIORITY_RESIDENCES: "Camille Guérin"
          PRIORITY_REPEAT: "3"
          HEARTBEAT_HOUR: "9"
          TIMEZONE: "Africa/Algiers"
          LOG_FILE: ""
        run: python crous_bot.py --once

      - name: Sauvegarder l'état (mémoire entre deux exécutions)
        run: |
          git config user.name "crous-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/etat.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "état de surveillance [skip ci]"
            for i in 1 2 3; do
              git fetch origin "${GITHUB_REF_NAME}"
              git merge -s ours "origin/${GITHUB_REF_NAME}" -m "fusion état [skip ci]" || true
              git push origin "HEAD:${GITHUB_REF_NAME}" && break
              sleep 3
            done
          fi
